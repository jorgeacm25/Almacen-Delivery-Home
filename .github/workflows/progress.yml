name: Update progress file

on:
  push:
    branches: [ '**' ]

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Create/update PROGRESS.md
        run: |
          echo "# Progress file" > PROGRESS.md
          echo "" >> PROGRESS.md
          echo "- Date: $(date -u '+%Y-%m-%d %H:%M:%SZ')" >> PROGRESS.md
          echo "- Commit: $(git rev-parse --short HEAD)" >> PROGRESS.md
          echo "- Message: $(git log -1 --pretty=%B | sed -n '1p')" >> PROGRESS.md
          echo "- Changed files:" >> PROGRESS.md
          git --no-pager show --name-only --pretty="" HEAD | sed '/^$/d' | sed 's/^/- /' >> PROGRESS.md || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push PROGRESS.md
        run: |
          git add PROGRESS.md
          if git diff --staged --quiet; then
            echo "No changes to PROGRESS.md"
          else
            git commit -m "chore(progress): update PROGRESS.md [skip ci]"
            git push
          fi
